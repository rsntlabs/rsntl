<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resonant Labs</title>
  <meta name="description" content="Resonant Labs">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#050508">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F5F5FA">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    html, body { overflow: hidden; }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%; height: 100%;
      padding: 2rem;
    }

    h1 {
      font-family: var(--font-serif);
      font-optical-sizing: auto;
      font-weight: 300;
      font-size: clamp(2.3rem, 12.65vw, 8rem);
      letter-spacing: -0.025em;
      line-height: 1;
      color: var(--fg);
      opacity: 0;
      animation: fade-up 0.7s var(--ease-spring) both;
      animation-delay: 0.35s;
    }

    .tagline {
      font-family: var(--font-serif);
      font-optical-sizing: auto;
      font-weight: 300;
      font-size: clamp(1.04rem, 4.6vw, 2.3rem);
      letter-spacing: -0.01em;
      color: var(--fg);
      margin-top: clamp(0.5rem, 2vw, 1.2rem);
      opacity: 0;
      animation: fade-up 0.7s var(--ease-spring) both;
      animation-delay: 0.5s;
    }

    a.cta {
      font-family: var(--font-serif);
      font-optical-sizing: auto;
      font-weight: 300;
      font-size: clamp(0.93rem, 2.4vw, 1.21rem);
      letter-spacing: 0.04em;
      color: var(--fg);
      text-decoration: none;
      margin-top: clamp(1.2rem, 3vw, 2rem);
      padding: 0.75em 1.8em;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-pill);
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
      opacity: 0;
      animation: fade-up 0.7s var(--ease-spring) both;
      animation-delay: 0.65s;
    }
    a.cta:hover {
      background: var(--accent-subtle);
      border-color: var(--accent);
      color: var(--fg);
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div id="vignette"></div>

  <nav class="site-nav">
    <span class="nav-pill"></span>
    <a href="index.html" class="nav-brand active">Resonant Labs</a>
    <a href="expertise.html" class="nav-link">Our Expertise</a>
  </nav>

  <div class="stage">
    <main>
      <h1>Resonant Labs</h1>
      <p class="tagline">Engineering that serves the business.<br>Strategy that understands the code.</p>
      <a class="cta" href="https://calendar.proton.me/bookings#XIas9qvemCj4sukGlTICmHmCk8u1LBbN3vzjGjqRM4I=" target="_blank" rel="noopener">Schedule a call</a>
    </main>
  </div>

  <script type="module" src="bg.js"></script>
  <script defer src="nav.js"></script>
  <script defer src="particles.js"></script>
</body>
</html>
