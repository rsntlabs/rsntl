<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resonant Labs</title>
  <meta name="description" content="Resonant Labs — High Performance Computing, 3D Graphics and GPU Technology">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#050508">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F5F5FA">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #050508;
      --fg:           rgba(255,255,255,0.92);
      --sub:          rgba(255,255,255,0.62);
      --sub-hover:    rgba(255,255,255,0.92);
      --card-bg:      rgba(5,5,10,0.28);
      --card-border:  rgba(255,255,255,0.09);
      --vignette:     radial-gradient(ellipse at 50% 50%,
                        transparent 20%, rgba(0,0,0,0.60) 100%);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:          #F5F5FA;
        --fg:          rgba(8,8,22,0.90);
        --sub:         rgba(8,8,22,0.52);
        --sub-hover:   rgba(8,8,22,0.88);
        --card-bg:     rgba(245,245,252,0.38);
        --card-border: rgba(255,255,255,0.70);
        --vignette:    radial-gradient(ellipse at 50% 50%,
                         transparent 20%, rgba(220,220,235,0.55) 100%);
      }
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
    }

    /* ── Animated grain overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%; height: 200%;
      pointer-events: none;
      z-index: 50;
      opacity: 0.038;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      animation: grain 0.4s steps(1) infinite;
    }

    @keyframes grain {
      0%   { transform: translate(0,    0);    }
      12%  { transform: translate(-6%,  -8%);  }
      24%  { transform: translate(8%,   -4%);  }
      36%  { transform: translate(-4%,  10%);  }
      48%  { transform: translate(10%,  -6%);  }
      60%  { transform: translate(-8%,  4%);   }
      72%  { transform: translate(4%,   8%);   }
      84%  { transform: translate(-10%, -2%);  }
      100% { transform: translate(6%,   -10%); }
    }

    /* ── WebGPU canvas ── */
    #bg {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* ── Vignette ── */
    #vignette {
      position: fixed;
      inset: 0;
      background: var(--vignette);
      pointer-events: none;
      z-index: 5;
    }

    /* ── Full-viewport frosted glass panel ── */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      backdrop-filter: blur(22px) saturate(1.4);
      -webkit-backdrop-filter: blur(22px) saturate(1.4);
      background: var(--card-bg);
      animation: card-in 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%; height: 100%;
      padding: 2rem;
    }

    @keyframes card-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── Heading ── */
    h1 {
      font-family: 'Fraunces', serif;
      font-optical-sizing: auto;
      font-weight: 300;
      font-size: clamp(2.6rem, 8vw, 7rem);
      letter-spacing: -0.025em;
      line-height: 1;
      color: var(--fg);
      opacity: 0;
      animation: fade-up 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.35s;
    }

    /* ── Email ── */
    a.contact {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: clamp(1rem, 2.2vw, 1.75rem);
      letter-spacing: 0.06em;
      color: var(--sub);
      text-decoration: none;
      margin-top: clamp(1.2rem, 2.2vw, 1.8rem);
      transition: color 0.35s ease, letter-spacing 0.35s ease;
      opacity: 0;
      animation: fade-up 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.55s;
    }
    a.contact:hover {
      color: var(--sub-hover);
      letter-spacing: 0.10em;
    }

    /* ── CSS fallback blobs ── */
    .blob-field {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--bg);
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.65;
      will-change: transform;
      animation: drift linear infinite;
    }
    @media (prefers-color-scheme: light) { .blob { opacity: 0.48; } }

    @keyframes drift {
      0%   { transform: translate(0,0)               scale(1); }
      20%  { transform: translate(var(--a),var(--b)) scale(var(--s1)); }
      45%  { transform: translate(var(--c),var(--d)) scale(var(--s2)); }
      70%  { transform: translate(var(--e),var(--f)) scale(var(--s3)); }
      100% { transform: translate(0,0)               scale(1); }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div id="vignette"></div>

  <div class="stage">
    <main>
      <h1>Resonant Labs</h1>
      <a class="contact" href="mailto:hello@rsntl.com">hello@rsntl.com</a>
    </main>
  </div>

  <script type="module">
  /* ─────────────────────────────────────────────────────────
     WebGPU animated blob-field background
     Cool colours cluster top-left; warm colours bottom-right.
     Falls back to CSS animation if WebGPU is unavailable.
  ───────────────────────────────────────────────────────── */

  const darkMQ = window.matchMedia('(prefers-color-scheme: dark)');
  const isDark  = () => darkMQ.matches;

  const WGSL = /* wgsl */`
struct Uni {
  time      : f32,
  dark_mode : f32,
  res_x     : f32,
  res_y     : f32,
}
@group(0) @binding(0) var<uniform> u: Uni;

@vertex
fn vs(@builtin(vertex_index) vi: u32) -> @builtin(position) vec4f {
  var pts = array<vec2f,6>(
    vec2f(-1,-1), vec2f(1,-1), vec2f(1, 1),
    vec2f(-1,-1), vec2f(1, 1), vec2f(-1, 1)
  );
  return vec4f(pts[vi], 0.0, 1.0);
}

/* Two large parent blobs — slow wide orbit around screen centre */
fn parent_pos(i: u32, t: f32) -> vec2f {
  let phi = f32(i) * 3.14159265;
  let spd = 0.06 + f32(i) * 0.03;
  let orb = 0.30 + 0.08 * sin(f32(i) * 1.7 + 0.5);
  return vec2f(
    0.5 + orb * cos(t * spd + phi) * (0.9 + 0.1 * sin(t * spd * 0.6 + phi)),
    0.5 + orb * sin(t * spd * 0.75 + phi) * (0.9 + 0.1 * cos(t * spd * 0.5 + phi))
  );
}

/* Four child blobs — faster, small orbit around their parent */
fn child_pos(idx: u32, t: f32) -> vec2f {
  let pc  = parent_pos(idx % 2u, t);
  let fi  = f32(idx);
  let phi = fi * 2.39996323;
  let spd = 0.22 + fi * 0.07;
  let orb = 0.10 + 0.04 * sin(fi * 2.1 + t * 0.08);
  return vec2f(
    pc.x + orb * cos(t * spd + phi),
    pc.y + orb * sin(t * spd * 0.85 + phi * 1.2)
  );
}

/* ── Colour palettes ─────────────────────────────
   Purple / violet family matching the original rsntl.com aesthetic.
   All entries keep one channel at 0.00 for maximum saturation.    */
fn dark_col(i: u32) -> vec3f {
  switch i {
    case 0u  { return vec3f(0.50, 0.00, 1.00); } /* violet          */
    case 1u  { return vec3f(0.30, 0.00, 1.00); } /* blue-violet     */
    case 2u  { return vec3f(0.65, 0.00, 1.00); } /* bright violet   */
    case 3u  { return vec3f(0.20, 0.00, 0.88); } /* indigo          */
    case 4u  { return vec3f(0.75, 0.00, 1.00); } /* electric violet */
    case 5u  { return vec3f(0.85, 0.00, 0.90); } /* violet-magenta  */
    case 6u  { return vec3f(0.40, 0.00, 0.95); } /* mid violet      */
    case 7u  { return vec3f(0.22, 0.00, 1.00); } /* deep blue-violet*/
    case 8u  { return vec3f(0.80, 0.00, 0.78); } /* purple-pink     */
    case 9u  { return vec3f(0.55, 0.00, 0.95); } /* soft violet     */
    default  { return vec3f(0.15, 0.00, 0.82); } /* deep indigo     */
  }
}

fn light_col(i: u32) -> vec3f {
  switch i {
    case 0u  { return vec3f(0.50, 0.00, 1.00); }
    case 1u  { return vec3f(0.30, 0.00, 1.00); }
    case 2u  { return vec3f(0.65, 0.00, 1.00); }
    case 3u  { return vec3f(0.20, 0.00, 0.88); }
    case 4u  { return vec3f(0.75, 0.00, 1.00); }
    case 5u  { return vec3f(0.85, 0.00, 0.90); }
    case 6u  { return vec3f(0.40, 0.00, 0.95); }
    case 7u  { return vec3f(0.22, 0.00, 1.00); }
    case 8u  { return vec3f(0.80, 0.00, 0.78); }
    case 9u  { return vec3f(0.55, 0.00, 0.95); }
    default  { return vec3f(0.15, 0.00, 0.82); }
  }
}

@fragment
fn fs(@builtin(position) frag: vec4f) -> @location(0) vec4f {
  let uv  = vec2f(frag.x / u.res_x, 1.0 - frag.y / u.res_y);
  let t   = u.time;

  var total = 0.0;
  var col   = vec3f(0.0);

  for (var i = 0u; i < 6u; i++) {
    let fi = f32(i);
    /* i < 2 → parent (large, slow);  i >= 2 → child (small, orbits parent) */
    var bp: vec2f;
    var r:  f32;
    if i < 2u {
      bp = parent_pos(i, t);
      r  = 0.28 + 0.05 * sin(fi * 1.73 + t * 0.06);
    } else {
      bp = child_pos(i - 2u, t);
      r  = 0.09 + 0.03 * sin(fi * 2.31 + t * 0.12);
    }
    let d = distance(uv, bp);
    let w = exp(-d * d / (r * r) * 3.5);
    let c = mix(light_col(i), dark_col(i), u.dark_mode);
    col   += c * w;
    total += w;
  }

  let bg_d = vec3f(0.020, 0.020, 0.031);
  let bg_l = vec3f(0.961, 0.961, 0.980);
  let bg   = mix(bg_l, bg_d, u.dark_mode);
  let amt  = clamp(total, 0.0, 1.0);
  let base = mix(bg, col / max(total, 0.0001), min(amt, 1.0));

  /* Luminance-weighted saturation boost: pull each channel away from grey */
  let lum  = dot(base, vec3f(0.2126, 0.7152, 0.0722));
  /* saturation boost on the blob colour; gaps fall back to raw bg */
  let boosted = clamp(mix(vec3f(lum), base, 1.65), vec3f(0.0), vec3f(1.0));
  let rgba     = mix(bg, boosted, min(amt * 1.2, 1.0));

  return vec4f(rgba, 1.0);
}
`;

  async function initWebGPU() {
    if (!navigator.gpu) throw new Error('WebGPU not supported');

    const adapter = await navigator.gpu.requestAdapter();
    if (!adapter) throw new Error('No WebGPU adapter');

    const device  = await adapter.requestDevice();
    const canvas  = document.getElementById('bg');
    const ctx     = canvas.getContext('webgpu');
    if (!ctx) throw new Error('webgpu context unavailable');

    const format  = navigator.gpu.getPreferredCanvasFormat();

    const configure = () => {
      canvas.width  = Math.round(window.innerWidth  * devicePixelRatio);
      canvas.height = Math.round(window.innerHeight * devicePixelRatio);
      ctx.configure({ device, format, alphaMode: 'opaque' });
    };
    configure();
    window.addEventListener('resize', configure, { passive: true });

    const uBuf = device.createBuffer({
      size: 16,
      usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
    });

    const bgl = device.createBindGroupLayout({
      entries: [{
        binding: 0, visibility: GPUShaderStage.FRAGMENT,
        buffer: { type: 'uniform' },
      }],
    });

    const bindGroup = device.createBindGroup({
      layout: bgl,
      entries: [{ binding: 0, resource: { buffer: uBuf } }],
    });

    const module = device.createShaderModule({ code: WGSL });

    const compInfo = await module.getCompilationInfo();
    for (const msg of compInfo.messages) {
      if (msg.type === 'error') {
        throw new Error(`WGSL error (line ${msg.lineNum}): ${msg.message}`);
      }
    }

    const pipeline = await device.createRenderPipelineAsync({
      layout:    device.createPipelineLayout({ bindGroupLayouts: [bgl] }),
      vertex:    { module, entryPoint: 'vs' },
      fragment:  { module, entryPoint: 'fs', targets: [{ format }] },
      primitive: { topology: 'triangle-list' },
    });

    const uni = new Float32Array(4);
    const t0   = performance.now();
    const seed = Math.random() * 1000;

    const frame = () => {
      uni[0] = seed + (performance.now() - t0) / 1000;
      uni[1] = isDark() ? 1.0 : 0.0;
      uni[2] = canvas.width;
      uni[3] = canvas.height;
      device.queue.writeBuffer(uBuf, 0, uni);

      const enc  = device.createCommandEncoder();
      const pass = enc.beginRenderPass({
        colorAttachments: [{
          view:       ctx.getCurrentTexture().createView(),
          clearValue: { r: 0.02, g: 0.02, b: 0.03, a: 1 },
          loadOp:     'clear',
          storeOp:    'store',
        }],
      });
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.draw(6);
      pass.end();
      device.queue.submit([enc.finish()]);
      requestAnimationFrame(frame);
    };
    requestAnimationFrame(frame);
  }

  /* ── CSS fallback ── */
  function initCSSFallback() {
    document.getElementById('bg').style.display = 'none';

    const field = document.createElement('div');
    field.className = 'blob-field';
    document.body.insertBefore(field, document.body.firstChild);

    const defs = [
      /* parents — large, slow */
      { color: '#7F00FF', size: 55, x: 25, y: 30, dur: 70 },
      { color: '#4D00FF', size: 50, x: 60, y: 55, dur: 90 },
      /* children of parent 0 — small, faster, start near parent 0 */
      { color: '#A600FF', size: 18, x: 32, y: 22, dur: 28 },
      { color: '#6600F2', size: 14, x: 18, y: 40, dur: 22 },
      /* children of parent 1 — small, faster, start near parent 1 */
      { color: '#BF00FF', size: 16, x: 68, y: 48, dur: 25 },
      { color: '#D900E5', size: 13, x: 55, y: 65, dur: 20 },
    ];

    const rnd = (lo, hi) => lo + Math.random() * (hi - lo);

    defs.forEach(d => {
      const el = document.createElement('div');
      el.className = 'blob';
      el.style.cssText = [
        `width:${d.size}vw`, `height:${d.size}vw`,
        `left:${d.x}%`, `top:${d.y}%`,
        `background:${d.color}`,
        `--a:${rnd(-20,20).toFixed(1)}vw`, `--b:${rnd(-20,20).toFixed(1)}vh`,
        `--c:${rnd(-20,20).toFixed(1)}vw`, `--d:${rnd(-20,20).toFixed(1)}vh`,
        `--e:${rnd(-15,15).toFixed(1)}vw`, `--f:${rnd(-15,15).toFixed(1)}vh`,
        `--s1:${rnd(0.85,1.2).toFixed(2)}`,
        `--s2:${rnd(0.80,1.25).toFixed(2)}`,
        `--s3:${rnd(0.90,1.15).toFixed(2)}`,
        `animation-duration:${d.dur}s`,
        `animation-delay:-${(Math.random()*d.dur).toFixed(2)}s`,
      ].join(';');
      field.appendChild(el);
    });
  }

  try {
    await initWebGPU();
  } catch (err) {
    console.info('WebGPU unavailable, using CSS fallback.', err.message);
    initCSSFallback();
  }
  </script>
</body>
</html>
